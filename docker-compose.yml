services:
  db:
    image: postgres:16-alpine
    container_name: airline_sim_db
    environment:
      POSTGRES_USER: airline
      POSTGRES_PASSWORD: airline
      POSTGRES_DB: airline_sim
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airline_sim_api
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: airline_sim_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
